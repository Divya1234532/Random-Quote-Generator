<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dreamy Quote Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:linear-gradient(135deg,#ffd6e8,#d6e6ff,#fbe7c6);
      animation:bgMove 10s infinite alternate;
    }

    @keyframes bgMove{
      0%{
        background-position:left;
      }
      100%{
        background-position:right;
      }
    }

    .container{
      width:90%;
      max-width:500px;
      padding:40px;
      text-align:center;
      border-radius:30px;
      background:rgba(255,255,255,0.35);
      backdrop-filter:blur(18px);
      box-shadow:0 8px 30px rgba(0,0,0,0.15);
      border:1px solid rgba(255,255,255,0.4);
      animation:fadeIn 1s ease;
      position:relative;
    }

    h1{
      color:#ff4f81;
      margin-bottom:25px;
      font-size:2.3rem;
    }

    #quote{
      color:#444;
      font-size:1.2rem;
      line-height:1.9;
      min-height:120px;
      margin-bottom:30px;
      transition:0.3s;
    }

    button{
      padding:14px 30px;
      border:none;
      border-radius:50px;
      background:linear-gradient(135deg,#ff8fb1,#ffb3c6);
      color:white;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      box-shadow:0 5px 15px rgba(255,143,177,0.4);
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-3px) scale(1.05);
    }

    .heart{
      position:absolute;
      color:white;
      font-size:20px;
      animation:float 6s linear infinite;
      opacity:0.6;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) scale(0);
      }
      100%{
        transform:translateY(-10vh) scale(1);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>🌸 Dreamy Quotes 🌸</h1>

    <p id="quote">
      Click below for a cute motivation ✨
    </p>

    <button onclick="generateQuote()">
      Generate Quote 💖
    </button>

  </div>

  <script>

    const quotes = [

      "You are becoming the person you once dreamed of ✨",

      "Soft hearts shine the brightest 💖",

      "Little progress each day adds up to big results 🌸",

      "Romanticize your life and enjoy the small moments ☁️",

      "You deserve all the beautiful things coming your way 🌷",

      "Your glow comes from your mindset ✨",

      "Be gentle with yourself while growing 🌼",

      "A calm mind creates a beautiful life 💕"

    ];

    function generateQuote(){

      const randomIndex =
      Math.floor(Math.random() * quotes.length);

      document.getElementById("quote").innerText =
      quotes[randomIndex];
    }

    function createHeart(){

      const heart = document.createElement("div");

      heart.classList.add("heart");

      heart.innerHTML = "💖";

      heart.style.left = Math.random() * 100 + "vw";

      heart.style.animationDuration =
      Math.random() * 3 + 3 + "s";

      document.body.appendChild(heart);

      setTimeout(()=>{
        heart.remove();
      },6000);
    }

    setInterval(createHeart,500);

  </script>

</body>
</html>
